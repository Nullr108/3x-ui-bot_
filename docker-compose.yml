services:
  bot:
    build: .
    container_name: 3xui-bot
    restart: unless-stopped          # авто-перезапуск после падения и после ребута сервера
    # Панель 3x-ui слушает на 127.0.0.1:2049 ХОСТА. В bridge-сети контейнера
    # 127.0.0.1 — это сам контейнер, поэтому используем сеть хоста: тогда
    # XUI_HOST=https://127.0.0.1:2049/... достучится до панели напрямую.
    network_mode: host
    env_file: .env                   # креды/настройки берутся из .env рядом с этим файлом
    environment:
      - DB_PATH=/data/bot.db         # БД храним в volume, чтобы переживала пересборку
    volumes:
      - botdata:/data
    logging:                         # чтобы логи не росли бесконечно
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  botdata:
